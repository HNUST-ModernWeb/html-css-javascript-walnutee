<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面整体布局 */
        body {
            min-height: 100vh;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 页面标题 */
        .page-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
        }

        /* 卡片容器：居中、阴影、圆角 */
        .card {
            width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease; /* 创新：悬浮动画 */
        }

        /* 卡片悬浮效果（创新加分） */
        .card:hover {
            transform: translateY(-5px);
        }

        /* 头像上传区域 */
        .avatar-container {
            position: relative;
            margin-bottom: 20px;
        }

        /* 圆形头像 */
        #avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #42b983;
            cursor: pointer;
        }

        /* 隐藏原生文件上传按钮 */
        #avatar-input {
            display: none;
        }

        /* 信息展示区域 */
        .info-display {
            text-align: center;
            margin: 15px 0;
            width: 100%;
        }

        /* 姓名样式 */
        #name-display {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        /* 简介样式 */
        #bio-display {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
            min-height: 40px;
        }

        /* 编辑输入框 */
        .edit-input {
            width: 100%;
            padding: 10px 15px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        /* 输入框聚焦效果 */
        .edit-input:focus {
            border-color: #42b983;
        }

        /* 保存按钮 */
        #save-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #42b983;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        /* 按钮悬浮效果 */
        #save-btn:hover {
            background-color: #359469;
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <h1 class="page-title">个人信息卡片</h1>

    <!-- 个人信息卡片 -->
    <div class="card">
        <!-- 头像区域 -->
        <div class="avatar-container">
            <img id="avatar" src="https://picsum.photos/200/200" alt="个人头像">
            <input type="file" id="avatar-input" accept="image/*">
        </div>

        <!-- 可编辑输入框 -->
        <input type="text" id="name-input" class="edit-input" placeholder="请输入姓名">
        <textarea id="bio-input" class="edit-input" rows="3" placeholder="请输入个人简介"></textarea>

        <!-- 信息展示区域 -->
        <div class="info-display">
            <div id="name-display">姓名</div>
            <div id="bio-display">个人简介</div>
        </div>

        <!-- 保存按钮 -->
        <button id="save-btn">保存信息</button>
    </div>

    <script>
        // 获取页面元素
        const avatarImg = document.getElementById('avatar');
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const bioInput = document.getElementById('bio-input');
        const nameDisplay = document.getElementById('name-display');
        const bioDisplay = document.getElementById('bio-display');
        const saveBtn = document.getElementById('save-btn');

        // 1. 点击头像触发文件上传
        avatarImg.addEventListener('click', () => {
            avatarInput.click();
        });

        // 2. 头像上传并实时预览
        avatarInput.addEventListener('change', (e) => {
            // 获取选择的文件
            const file = e.target.files[0];
            if (file) {
                // 创建文件读取对象
                const reader = new FileReader();
                reader.onload = (event) => {
                    // 替换头像图片
                    avatarImg.src = event.target.result;
                };
                // 读取文件为URL
                reader.readAsDataURL(file);
            }
        });

        // 3. 保存按钮功能：更新展示内容
        saveBtn.addEventListener('click', () => {
            // 获取输入框的值
            const newName = nameInput.value.trim() || '姓名';
            const newBio = bioInput.value.trim() || '个人简介';
            
            // 更新展示文本
            nameDisplay.textContent = newName;
            bioDisplay.textContent = newBio;

            // 保存后清空输入框（优化体验）
            nameInput.value = '';
            bioInput.value = '';

            alert('信息保存成功！');
        });
    </script>
</body>
</html>
